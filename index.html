<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>imminenti</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="app-shell">
      <section class="left-panel">
        <header class="panel-header">
          <div>
            <h1>imminenti</h1>
            <div id="week-range" class="week-range"></div>
          </div>
          <div class="header-actions">
            <button id="prev-week-btn" class="btn" type="button" title="Previous week">Prev</button>
            <button id="next-week-btn" class="btn" type="button" title="Next week">Next</button>
          </div>
        </header>

        <div id="week-grid" class="week-grid"></div>
      </section>

      <aside class="right-panel">
        <header class="panel-header tight">
          <div>
            <div class="right-tabs">
              <button id="tab-ongoing-btn" class="tab active" type="button">Ongoing</button>
              <button id="tab-links-btn" class="tab" type="button">Links</button>
            </div>
            <div id="right-subtitle" class="subtle">Subtitle</div>
          </div>

          <div class="header-actions">
            <button id="add-ongoing-btn" class="btn primary" type="button">Add</button>
            <button id="add-collection-btn" class="btn primary" type="button" hidden>Add collection</button>
          </div>
        </header>

        <div id="ongoing-list" class="ongoing-list"></div>
        <div id="links-panel" class="links-panel" hidden></div>
      </aside>
    </main>

    <dialog id="task-dialog" class="task-dialog">
      <form id="task-form" method="dialog" class="dialog-body">
        <h3 id="dialog-title">Task</h3>
        <div id="dialog-context" class="dialog-context"></div>

        <label class="field">
          <span>Title</span>
          <input id="task-title-input" name="title" type="text" maxlength="200" required />
        </label>

        <label class="field">
          <span>Notes</span>
          <textarea id="task-notes-input" name="notes" rows="4" maxlength="2000"></textarea>
        </label>

        <label id="task-urgent-field" class="checkbox-row">
          <input id="task-urgent-input" name="isUrgent" type="checkbox" />
          <span>Urgent</span>
        </label>

        <section class="task-links-section">
          <div class="task-links-title">Links</div>
          <div id="task-links-box" class="task-links-box"></div>
        </section>

        <div class="dialog-actions">
          <button id="delete-task-btn" class="btn danger" type="button">Delete</button>
          <div class="dialog-actions-right">
            <button id="cancel-task-btn" class="btn" type="button">Cancel</button>
            <button id="save-task-btn" class="btn primary" type="submit">Save</button>
          </div>
        </div>
      </form>
    </dialog>
    <dialog id="links-dialog" class="task-dialog">
      <form id="links-form" method="dialog" class="dialog-body">
        <h3 id="links-dialog-title">Links</h3>
        <div id="links-dialog-context" class="dialog-context"></div>

        <label id="lc-name-field" class="field">
          <span>Name</span>
          <input id="lc-name-input" type="text" maxlength="200" />
        </label>

        <label id="lc-color-field" class="field">
          <span>Color (hex)</span>
          <input id="lc-color-input" type="text" maxlength="9" placeholder="#RRGGBB" />
        </label>

        <label id="l-title-field" class="field">
          <span>Title</span>
          <input id="l-title-input" type="text" maxlength="200" />
        </label>

        <label id="l-url-field" class="field">
          <span>URL</span>
          <input id="l-url-input" type="text" maxlength="2000" placeholder="https://…" />
        </label>

        <div class="dialog-actions">
          <button id="links-delete-btn" class="btn danger" type="button">Delete</button>
          <div class="dialog-actions-right">
            <button id="links-cancel-btn" class="btn" type="button">Cancel</button>
            <button id="links-save-btn" class="btn primary" type="submit">Save</button>
          </div>
        </div>
      </form>
    </dialog>
  </body>
</html>
