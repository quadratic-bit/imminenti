<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>imminenti</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="app-shell">
      <section class="left-panel">
        <header class="panel-header">
          <div>
            <h1>imminenti</h1>
            <div id="week-range" class="week-range"></div>
          </div>
          <div class="header-actions">
            <button id="prev-week-btn" class="btn" type="button" title="Previous week">Prev</button>
            <button id="next-week-btn" class="btn" type="button" title="Next week">Next</button>
            <button id="open-links-btn" class="btn" type="button" title="Links">Links</button>
          </div>
        </header>

        <div id="week-grid" class="week-grid"></div>
      </section>

      <aside class="right-panel">
        <header class="panel-header">
          <div>
            <h2>Ongoing</h2>
          </div>

          <div class="header-actions">
            <button id="add-ongoing-btn" class="btn primary" type="button">Add</button>
          </div>
        </header>

        <div id="ongoing-list" class="ongoing-list"></div>
      </aside>
    </main>

    <dialog id="task-dialog" class="task-dialog">
      <form id="task-form" method="dialog" class="dialog-body">
        <h3 id="dialog-title">Task</h3>
        <div id="dialog-context" class="dialog-context"></div>

        <label class="field">
          <span>Title</span>
          <input id="task-title-input" name="title" type="text" maxlength="200" required />
        </label>

        <label class="field">
          <span>Notes</span>
          <textarea id="task-notes-input" name="notes" rows="4" maxlength="2000"></textarea>
        </label>

        <label id="task-urgent-field" class="checkbox-row">
          <input id="task-urgent-input" name="isUrgent" type="checkbox" />
          <span>Urgent</span>
        </label>

        <section class="task-links-section">
          <div class="task-links-title">Links</div>
          <div id="task-links-box" class="task-links-box"></div>
        </section>

        <div class="dialog-actions">
          <button id="delete-task-btn" class="btn danger" type="button">Delete</button>
          <div class="dialog-actions-right">
            <button id="cancel-task-btn" class="btn" type="button">Cancel</button>
            <button id="save-task-btn" class="btn primary" type="submit">Save</button>
          </div>
        </div>
      </form>
    </dialog>
  </body>

  <dialog id="collections-dialog" class="task-dialog collections-dialog">
    <form id="collections-form" method="dialog" class="dialog-body">
      <h3 id="collections-dialog-title">Links</h3>
      <div id="collections-dialog-context" class="dialog-context"></div>

      <section id="collections-browser" class="collections-browser">
        <div class="dialog-actions">
          <button id="collections-add-btn" class="btn primary" type="button">Add collection</button>
          <div class="dialog-actions-right">
            <button id="collections-close-btn" class="btn" type="button">Close</button>
          </div>
        </div>

        <div id="collections-list" class="collections-list"></div>
        <div id="collection-links" class="collection-links"></div>
      </section>

      <section id="collections-editor" class="collections-editor" hidden>
        <label class="field">
          <span>Name</span>
          <input id="collection-name-input" type="text" maxlength="200" />
        </label>

        <label class="field">
          <span>Color (hex)</span>
          <input id="collection-color-input" type="text" maxlength="9" placeholder="#RRGGBB" />
        </label>

        <div class="dialog-actions">
          <button id="collection-delete-btn" class="btn danger" type="button">Delete</button>
          <div class="dialog-actions-right">
            <button id="collection-cancel-btn" class="btn" type="button">Cancel</button>
            <button id="collection-save-btn" class="btn primary" type="submit">Save</button>
          </div>
        </div>
      </section>
    </form>
  </dialog>

  <dialog id="link-dialog" class="task-dialog">
    <form id="link-form" method="dialog" class="dialog-body">
      <h3 id="link-dialog-title">Link</h3>
      <div id="link-dialog-context" class="dialog-context"></div>

      <label class="field">
        <span>Title</span>
        <input id="link-title-input" type="text" maxlength="200" />
      </label>

      <label class="field">
        <span>URL</span>
        <input id="link-url-input" type="text" maxlength="2000" placeholder="https://…" />
      </label>

      <div class="dialog-actions">
        <button id="link-delete-btn" class="btn danger" type="button">Delete</button>
        <div class="dialog-actions-right">
          <button id="link-cancel-btn" class="btn" type="button">Cancel</button>
          <button id="link-save-btn" class="btn primary" type="submit">Save</button>
        </div>
      </div>
    </form>
  </dialog>
</html>
